version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthquiz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: healthquiz_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthquiz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Next.js App ───────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:healthquiz_pass@postgres:5432/healthquiz
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
